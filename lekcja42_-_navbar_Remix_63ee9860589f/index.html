<!DOCTYPE html>
<html lang="pl">
  
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lekcja 42 - navbar</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <nav class='navbar navbar-expand-lg navbar-dark bg-dark'>

          <a href='#' class='navbar-brand'>Moja strona</a>

            <span class='navbar-toggler-icon'></span>
          </button>
          <div class='collapse navbar-collapse' id='navbarNav'>

              <li class='nav-item'>
                <a href='#' class='nav-link'><i class="bi bi-house"></i> Strona główna</a>
              </li>  
              <li class='nav-item'>
                <a href='#' class='nav-link'><i class="bi bi-info-circle"></i> O nas</a>
              </li>  
              <li class='nav-item'>
                <a href='#' class='nav-link'><i class="bi bi-envelope"></i> Kontakt</a>
              </li>  
              <li class='nav-item'>
                <a href='#' class='nav-link'><i class="bi bi-person"></i> Profil</a>
              </li>  
            </ul>
            <form class='d-flex'>
              <input class='form-control me-2' type='serch' placeholder='Szukaj' aria-label='Szukaj'>
              <button class='btn btn-outline-success' type='submit'>Szukaj</button>
            </form>
          </div>
    </div>
  </nav>
  <div class='container mt-5'>
    <h1>Witamy na naszej stronie!</h1>
    <p>Ta strona zawiera przykładowy pasek nawigacyjny z formularzem wyszukiwania i ikonami stworzony za pomocą Bootstrapa.</p>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
