<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Hello World!</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>

  <body>
    <p id='tekst'>JavaScript</p>
    <p id='doPrzetlumaczenia'>Najczęściej spotykanym zastosowaniem języka JavaScript są strony internetowe. Skrypty te służą najczęściej do zapewnienia interakcji poprzez reagowanie na zdarzenia, walidacji danych wprowadzanych w formularzach lub tworzenia złożonych efektów wizualnych.</p>
    <button id='btnTlumacz'>Tłumacz tekst</button>
    <form>
      <fieldset>
        <legend>
          Logowanie
        </legend>
        <label>Login:*</label>
        <br>
        <input id="login" type="text" name="login">
        <br>
        <label>Hasło:*</label>
        <br>
        <input id="pass" type="password" name="pass">
        <br><br>
        <input id="zaloguj" type="button" value="Zaloguj">
      </fieldset>
    </form>
    
    <p id="infoLogowanie"></p>
  </body>
  
</html>
